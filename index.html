<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding-top: 50px; background: #f4f4f9; }
        input { padding: 10px; font-size: 1.2rem; border-radius: 5px; border: 1px solid #ccc; width: 250px; }
        button { padding: 10px 20px; font-size: 1.2rem; background: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; margin-top: 10px; }
        #status { margin-top: 15px; color: #555; }
    </style>
</head>
<body>

    <h2>Enter ID</h2>
    <input type="text" id="idInput" placeholder="Scan or type ID here...">
    <button onclick="submitID()">Submit</button>
    <p id="status"></p>

    <script>
        const scriptURL = 'YOUR_APPS_SCRIPT_WEB_APP_URL_HERE';

        async function submitID() {
            const idValue = document.getElementById('idInput').value;
            const status = document.getElementById('status');
            
            if (!idValue) return;
            status.innerText = "Sending...";

            try {
                await fetch(scriptURL, {
                    method: 'POST',
                    body: JSON.stringify({ id: idValue })
                });
                status.innerText = "ID saved successfully!";
                document.getElementById('idInput').value = ''; // Clear input
            } catch (error) {
                status.innerText = "Error saving ID.";
                console.error('Error!', error.message);
            }
        }
    </script>
</body>
</html>
