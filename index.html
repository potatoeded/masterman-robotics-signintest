<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; background: #f4f4f9; margin: 0; gap: 0px; }        
        input { padding: 10px; font-size: 1.2rem; border-radius: 5px; border: 1px solid #ccc; width: 250px; }
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
          -webkit-appearance: none;
          margin: 0;
        }
        input[type=number] {
          -moz-appearance: textfield;
        }
        button { padding: 10px 20px; font-size: 1.2rem; background: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; margin-top: 20px; }
        #status { margin-top: 20px; color: transparent; transition: color 0.2s ease; }
    </style>
</head>
<body>

    <h2>Masterman Robotics Signintest</h2>
    <input type="number" id="idInput" placeholder="Scan or type ID here..." autofocus>
    <button onclick="registerID()">Register</button>
    <p id="status">Placeholder</p>

    <script>
		const scriptURL = 'https://script.google.com/macros/s/AKfycbxT_J37WfWeStzVmBeFa3HLDv9sddcgWqV3x9BCix9sXI0O8QyjhWhnGotz29l_zD_1/exec';
		
		(function() {
			const auth_token = "4829105739482016";
		    const authorized = localStorage.getItem(auth_token);
		
		    if (authorized !== "Access granted!") {
		        document.documentElement.innerHTML = `
		            <div style="display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; width:100vw; background:#f4f4f9; font-family:sans-serif; margin:0;">
		                <h1 style="margin:0 0 10px 0;">Access Denied</h1>
		                <p style="margin:0 0 20px 0;">This device is not authorized to use this kiosk.</p>
		                <div style="display:flex; gap:10px;">
		                    <input type="password" id="adminPass" placeholder="Enter Admin Key" style="padding:10px; border-radius:5px; border:1px solid #ccc; outline:none;">
							<button onclick="authorizeDevice()" style="padding:10px 20px; background:#28a745; color:white; border:none; border-radius:5px; cursor:pointer;">Authorize</button>
						</div>
		            </div>
		        `;
		        
		        window.authorizeDevice = async function() {
	            	const pass = document.getElementById('adminPass').value;	
					
		            try {
		                const response = await fetch(scriptURL, {
		                    method: 'POST',
				      		body: JSON.stringify({ 
				        	id: "0", 
				        	action: pass 
							})
		                });
		                const data = await response.json();
		
		                if (data.message === "Access granted!") {
		                    localStorage.setItem(auth_token, data.message);
		                    location.reload();
		                } else {
		                    alert("Invalid key!");
		                }
		            } catch (e) {
		                alert("Error granting access!");
		            }
	        	};
	        	throw new Error("Access not granted!");
			}
		})();

        const idInput = document.getElementById('idInput');
        const status = document.getElementById('status');
		const button = document.getElementById('button');

        let statusTimeout = null
        function displayStatus(text, color = '#555') {
            if (statusTimeout) {
                clearTimeout(statusTimeout)
            }

			status.style.color = "transparent"

			statusTimeout = setTimeout(() => {
                status.innerText = text
            	status.style.color = color
            }, 100);
			
            statusTimeout = setTimeout(() => {
                status.style.color = "transparent"
                statusTimeout = null;
            }, 3000);
        }
        async function registerID() {
			const idValue = idInput.value;
		  
		  	if (!idValue || (idValue.length !== 7 && idValue.length !== 8)) {
		    	displayStatus("ID must be 7 or 8 digits!", "red");
		    	idInput.value = "";
		    	return;
		  	}
				
		  	try {
		    	const response = await fetch(scriptURL, {
		      		method: 'POST',
		      		body: JSON.stringify({ 
		        	id: idValue, 
		        	action: "register" 
		    	})
		    });
		
		    	const data = await response.json();
		    	displayStatus(data.message, data.color);
		    	idInput.value = '';
		  	} catch (error) {
		    	console.error('Error!', error.message);
		  	}
		}
		const handleInput = (e) => {
		    const invalidChars = ['e', 'E', '+', '-', '.'];		
			
		    if (invalidChars.includes(e.key)) {
		        e.preventDefault();
		        return;
		    }
		
		    if (e.target.value.length >= 8 && !controlKeys.includes(e.key)) {
		        e.preventDefault();
		    }
		};
		idInput.addEventListener('keydown', handleInput);
		async function processID(idValue) {		    
		    const idToSend = idValue;		
		    try {
		        const response = await fetch(scriptURL, {
		            method: 'POST',
		            body: JSON.stringify({ 
		                id: idToSend, 
		                action: "automatic" 
		            })
		        });
		
		        const data = await response.json();
		        displayStatus(data.message, data.color);
				idInput.value = ""; 
		
		    } catch (error) {
		        console.error('Error!', error.message);
		    }
		}
		let typingTimeout = null;
		idInput.addEventListener('input', function(e) {
		    this.value = this.value.replace(/[^\d]/g, '');
			if (this.value.length > 8) {
		        this.value = this.value.slice(0, 8);
		    }
			if (typingTimeout) clearTimeout(typingTimeout);

          	if (this.value.length === 7 || this.value.length === 8) {
              	typingTimeout = setTimeout(() => {
					processID(this.value);
		    	}, 500); 
          	}
		});
		idInput.addEventListener('blur', () => {
    		idInput.focus();
		});

    </script>
</body>
</html>
