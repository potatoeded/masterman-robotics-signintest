<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; background: #f4f4f9; margin: 0; gap: 0px; }        
        input { padding: 10px; font-size: 1.2rem; border-radius: 5px; border: 1px solid #ccc; width: 250px; }
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
          -webkit-appearance: none;
          margin: 0;
        }
        input[type=number] {
          -moz-appearance: textfield;
        }
        button { padding: 10px 20px; font-size: 1.2rem; background: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; margin-top: 20px; }
        #status { margin-top: 20px; color: #555; }
    </style>
</head>
<body>

    <h2>Masterman Robotics Signintest</h2>
    <input type="number" id="idInput" placeholder="Scan or type ID here..." autofocus>
    <button onclick="registerID()">Register</button>
    <p id="status"></p>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbxT_J37WfWeStzVmBeFa3HLDv9sddcgWqV3x9BCix9sXI0O8QyjhWhnGotz29l_zD_1/exec';
        const idInput = document.getElementById('idInput')
        const status = document.getElementById('status');

        let statusTimeout = null
        function displayStatus(text, color = '#555') {
            status.innerText = text
            status.style.color = color

            if (statusTimeout) {
                clearTimeout(statusTimeout)
            }

            statusTimeout = setTimeout(() => {
                status.innerText = '';
                statusTimeout = null;
            }, 3000);
        }
        async function registerID() {
        	const idValue = idInput.value;
        	if (!idValue) return;

    		displayStatus("Sending...");

          	if (!idValue || (idValue.length !== 7 && idValue.length !== 8)) {
            	status.innerText = "ID must be 7 or 8 digits!";
            	status.style.color = "red";
            	input.value = ""; 
            	return;
          	}
            
          	try {
            	await fetch(scriptURL, {
              		method: 'POST',
              		mode: 'no-cors', 
              		cache: 'no-cache',
              		headers: { 'Content-Type': 'application/json' },
              		body: JSON.stringify({ id: idValue })
           	 	});
				
            	status.innerText = "Success sending ID!";
            	status.style.color = "green";
            	document.getElementById('idInput').value = ''; 
        	} catch (error) {
            	status.innerText = "Error sending ID!";
            	status.style.color = "red";
            	console.error('Error!', error.message);
        	}
    	}
		function blockScientificNotation(event) {
		    const invalidChars = ['e', 'E', '+', '-'];
		    if (invalidChars.includes(event.key)) {
		        event.preventDefault();
		    }
		}
		
		idInput.addEventListener('keydown', blockScientificNotation);
        idInput.addEventListener('input', async () => {
          this.value = this.value.replace(/[^\d]/g, '');
  
          const val = input.value.trim();
        
          if (val.length === 7 || val.length === 8) {
              
          }
        });

    </script>
</body>
</html>
